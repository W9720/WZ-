name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List targets
        run: xcodebuild -list -project WarZoneChanger.xcodeproj

      - name: Build for iOS Simulator
        run: |
          xcodebuild clean build \
            -project WarZoneChanger.xcodeproj \
            -target WarZoneChanger \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES