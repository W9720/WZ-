name: iOS Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Export IPA
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 15.4

      - name: Verify Xcode version
        run: |
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-path

      - name: Verify project structure
        run: |
          echo "=== Project files ==="
          ls -la
          echo "=== Xcode project contents ==="
          ls -la WarZoneChanger.xcodeproj/
          echo "=== Sources ==="
          find WarZoneChanger PacketTunnel -name "*.swift"

      - name: Validate project file
        run: |
          echo "=== Checking project.pbxproj integrity ==="
          plutil -lint WarZoneChanger.xcodeproj/project.pbxproj
          echo "✓ project.pbxproj is valid JSON/plist"

      - name: List project info
        run: |
          echo "=== Project targets and schemes ==="
          xcodebuild -list -project WarZoneChanger.xcodeproj

      - name: Build PacketTunnel target
        run: |
          xcodebuild build \
            -project WarZoneChanger.xcodeproj \
            -target PacketTunnel \
            -configuration Release \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates

      - name: Build WarZoneChanger target
        run: |
          xcodebuild build \
            -project WarZoneChanger.xcodeproj \
            -target WarZoneChanger \
            -configuration Release \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates

      - name: Locate app bundle
        run: |
          echo "=== Searching for built app ==="
          DERIVED_DATA=~/Library/Developer/Xcode/DerivedData
          echo "Derived Data: $DERIVED_DATA"
          
          APP_PATH=$(find "$DERIVED_DATA" -name "WarZoneChanger.app" -type d 2>/dev/null | grep -i "iphonesimulator" | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Direct search failed, listing DerivedData..."
            ls -la "$DERIVED_DATA"
            echo "Looking for Release-iphonesimulator..."
            find "$DERIVED_DATA" -type d -name "Release-iphonesimulator" 2>/dev/null
            APP_PATH=$(find "$DERIVED_DATA" -name "WarZoneChanger.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -n "$APP_PATH" ]; then
            echo "✓ Found app at: $APP_PATH"
            echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
            ls -la "$APP_PATH"
          else
            echo "✗ Could not find WarZoneChanger.app"
            echo "Showing build logs..."
            find "$DERIVED_DATA" -name "*.log" -type f 2>/dev/null | head -5
            exit 1
          fi

      - name: Create IPA package
        run: |
          if [ -z "$APP_PATH" ]; then
            echo "✗ APP_PATH not set"
            exit 1
          fi
          
          echo "=== Creating IPA ==="
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          
          echo "=== Contents of Payload ==="
          ls -la build/Payload/
          ls -la build/Payload/WarZoneChanger.app/
          
          cd build
          zip -r WarZoneChanger.ipa Payload
          cd ..
          
          echo "✓ IPA created successfully"
          ls -la build/WarZoneChanger.ipa

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WarZoneChanger-IPA
          path: build/WarZoneChanger.ipa
          retention-days: 90

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/**/*.xcactivitylog
          retention-days: 30
