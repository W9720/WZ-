name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build for iOS Simulator
        run: |
          set -x
          xcodebuild clean build \
            -project WarZoneChanger.xcodeproj \
            -target WarZoneChanger \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO 2>&1 | head -100
        continue-on-error: true

      - name: Build output
        run: |
          xcodebuild clean build \
            -project WarZoneChanger.xcodeproj \
            -target WarZoneChanger \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO