name: iOS Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 15.4

      - name: Show project info
        run: |
          xcodebuild -version
          ls -la
          xcodebuild -list -project WarZoneChanger.xcodeproj

      - name: Build PacketTunnel
        run: |
          xcodebuild build \
            -project WarZoneChanger.xcodeproj \
            -target PacketTunnel \
            -configuration Release \
            -sdk iphonesimulator \
            CONFIGURATION_BUILD_DIR=$(pwd)/build \
            CODE_SIGNING_ALLOWED=NO

      - name: Build WarZoneChanger
        run: |
          xcodebuild build \
            -project WarZoneChanger.xcodeproj \
            -target WarZoneChanger \
            -configuration Release \
            -sdk iphonesimulator \
            CONFIGURATION_BUILD_DIR=$(pwd)/build \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          APP_PATH=./build/WarZoneChanger.app
          
          if [ ! -d "$APP_PATH" ]; then
            echo "Could not find app at $APP_PATH"
            ls -la ./build/
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          mkdir -p ./ipa/Payload
          cp -R "$APP_PATH" ./ipa/Payload/
          cd ./ipa
          zip -r WarZoneChanger.ipa Payload
          cd ..
          ls -la ./ipa/WarZoneChanger.ipa

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WarZoneChanger-IPA
          path: ipa/WarZoneChanger.ipa
          retention-days: 90
