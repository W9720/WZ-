name: iOS Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 15.4

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Clean Build
        run: xcodebuild clean -project WarZoneChanger.xcodeproj -scheme WarZoneChanger -configuration Release

      - name: Verify Bundle IDs
        run: |
          echo "=== Checking Info.plist paths ==="
          ls -la WarZoneChanger/
          ls -la PacketTunnel/
          echo ""
          echo "=== Bundle IDs ==="
          echo "主应用Bundle ID: $(/usr/libexec/PlistBuddy -c 'Print CFBundleIdentifier' WarZoneChanger/Info.plist || echo 'NOT_FOUND')"
          echo "扩展Bundle ID: $(/usr/libexec/PlistBuddy -c 'Print CFBundleIdentifier' PacketTunnel/Info.plist || echo 'NOT_FOUND')"
          echo ""
          echo "=== Project Bundle IDs ==="
          grep -A2 "PRODUCT_BUNDLE_IDENTIFIER" WarZoneChanger.xcodeproj/project.pbxproj | head -20

      - name: Verify Entitlements
        run: |
          echo "=== 主应用 Entitlements ==="
          cat WarZoneChanger/WarZoneChanger.entitlements
          echo ""
          echo "=== 扩展 Entitlements ==="
          cat PacketTunnel/PacketTunnel.entitlements

      - name: Show project info
        run: |
          xcodebuild -version
          ls -la
          xcodebuild -list -project WarZoneChanger.xcodeproj

      - name: Build PacketTunnel
        run: |
          xcodebuild build \
            -project WarZoneChanger.xcodeproj \
            -target PacketTunnel \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CONFIGURATION_BUILD_DIR=$(pwd)/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Build WarZoneChanger
        run: |
          xcodebuild build \
            -project WarZoneChanger.xcodeproj \
            -target WarZoneChanger \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CONFIGURATION_BUILD_DIR=$(pwd)/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO 2>&1 | head -150
          echo "=== Build completed, checking output ==="
          ls -la ./build/WarZoneChanger.app/
          echo "=== Checking for executable ==="
          if [ -f "./build/WarZoneChanger.app/WarZoneChanger" ]; then
            echo "Executable found"
            file ./build/WarZoneChanger.app/WarZoneChanger
          else
            echo "Executable NOT found!"
            find ./build -name "WarZoneChanger" -type f
            exit 1
          fi

      - name: Install ldid for jailbroken signing
        run: |
          brew install ldid

      - name: Embed PacketTunnel extension into app
        run: |
          mkdir -p ./build/WarZoneChanger.app/PlugIns
          if [ -d "./build/PacketTunnel.appex" ]; then
            cp -R ./build/PacketTunnel.appex ./build/WarZoneChanger.app/PlugIns/
            echo "PacketTunnel.appex embedded successfully"
            ls -la ./build/WarZoneChanger.app/PlugIns/
          else
            echo "ERROR: PacketTunnel.appex not found!"
            ls -la ./build/
            exit 1
          fi

      - name: Sign PacketTunnel extension
        run: |
          if [ -f "./build/WarZoneChanger.app/PlugIns/PacketTunnel.appex/PacketTunnel" ]; then
            echo "=== Signing extension ==="
            echo "Entitlements content:"
            cat ./PacketTunnel/PacketTunnel.entitlements
            echo ""
            ldid -S./PacketTunnel/PacketTunnel.entitlements ./build/WarZoneChanger.app/PlugIns/PacketTunnel.appex/PacketTunnel 2>&1
            echo "Extension signed"
          else
            echo "PacketTunnel.appex not found!"
            exit 1
          fi

      - name: Sign main app with entitlements
        run: |
          echo "=== Signing main app ==="
          echo "Entitlements content:"
          cat ./WarZoneChanger/WarZoneChanger.entitlements
          echo ""
          ldid -S./WarZoneChanger/WarZoneChanger.entitlements ./build/WarZoneChanger.app/WarZoneChanger 2>&1
          echo "App signed"

      - name: Verify signing
        run: |
          echo "=== Verify extension entitlements ==="
          if [ -f "./build/WarZoneChanger.app/PlugIns/PacketTunnel.appex/PacketTunnel" ]; then
            ldid -e ./build/WarZoneChanger.app/PlugIns/PacketTunnel.appex/PacketTunnel 2>&1
          fi
          echo ""
          echo "=== Verify main app entitlements ==="
          ldid -e ./build/WarZoneChanger.app/WarZoneChanger 2>&1

      - name: Verify build structure
        run: |
          echo "=== Final build structure ==="
          ls -la ./build/WarZoneChanger.app/
          ls -la ./build/WarZoneChanger.app/PlugIns/

      - name: Create IPA
        run: |
          APP_PATH=./build/WarZoneChanger.app
          
          if [ ! -d "$APP_PATH" ]; then
            echo "Could not find app at $APP_PATH"
            ls -la ./build/
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          mkdir -p ./ipa/Payload
          cp -R "$APP_PATH" ./ipa/Payload/
          cd ./ipa
          zip -r WarZoneChanger.ipa Payload
          cd ..
          ls -la ./ipa/WarZoneChanger.ipa

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WarZoneChanger-IPA
          path: ipa/WarZoneChanger.ipa
          retention-days: 90
