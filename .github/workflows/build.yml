name: iOS Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 15.4

      - name: Show project info
        run: |
          xcodebuild -version
          ls -la
          xcodebuild -list -project WarZoneChanger.xcodeproj

      - name: Build PacketTunnel
        run: |
          xcodebuild build \
            -project WarZoneChanger.xcodeproj \
            -target PacketTunnel \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CONFIGURATION_BUILD_DIR=$(pwd)/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Build WarZoneChanger
        run: |
          xcodebuild build \
            -project WarZoneChanger.xcodeproj \
            -target WarZoneChanger \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CONFIGURATION_BUILD_DIR=$(pwd)/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO 2>&1 | head -150
          echo "=== Build completed, checking output ==="
          ls -la ./build/WarZoneChanger.app/
          echo "=== Checking for executable ==="
          if [ -f "./build/WarZoneChanger.app/WarZoneChanger" ]; then
            echo "Executable found"
            file ./build/WarZoneChanger.app/WarZoneChanger
          else
            echo "Executable NOT found!"
            find ./build -name "WarZoneChanger" -type f
            exit 1
          fi

      - name: Embed PacketTunnel extension into app
        run: |
          mkdir -p ./build/WarZoneChanger.app/PlugIns
          if [ -d "./build/PacketTunnel.appex" ]; then
            cp -R ./build/PacketTunnel.appex ./build/WarZoneChanger.app/PlugIns/
            echo "PacketTunnel.appex embedded successfully"
          else
            echo "ERROR: PacketTunnel.appex not found!"
            ls -la ./build/
            exit 1
          fi

      - name: Install ldid for jailbroken signing
        run: |
          brew install ldid

      - name: Check build structure
        run: |
          ls -la ./build/
          ls -la ./build/WarZoneChanger.app/
          ls -la ./build/WarZoneChanger.app/PlugIns/ 2>/dev/null || echo "No PlugIns folder"

      - name: Sign app with entitlements
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing build directory:"
          ls -la ./build/
          echo "Listing WarZoneChanger.app:"
          ls -la ./build/WarZoneChanger.app/
          echo "App executable exists: $(test -f ./build/WarZoneChanger.app/WarZoneChanger && echo YES || echo NO)"
          echo "Checking entitlements file:"
          ls -la ./WarZoneChanger/WarZoneChanger.entitlements
          echo "Entitlements exists: $(test -f ./WarZoneChanger/WarZoneChanger.entitlements && echo YES || echo NO)"
          echo "Contents of entitlements:"
          cat ./WarZoneChanger/WarZoneChanger.entitlements
          echo "ldid version:"
          ldid --version 2>&1 || echo "ldid not found"
          echo "Signing app..."
          ldid -S./WarZoneChanger/WarZoneChanger.entitlements ./build/WarZoneChanger.app/WarZoneChanger 2>&1 || { echo "Failed to sign app"; exit 1; }
          echo "App signed successfully"
          echo "Checking PlugIns directory:"
          ls -la ./build/WarZoneChanger.app/PlugIns/ 2>/dev/null || echo "PlugIns directory not found"
          if [ -d "./build/WarZoneChanger.app/PlugIns" ]; then
            ls -la ./build/WarZoneChanger.app/PlugIns/
          fi
          if [ -f "./build/WarZoneChanger.app/PlugIns/PacketTunnel.appex/PacketTunnel" ]; then
            echo "Signing extension..."
            ls -la ./PacketTunnel/PacketTunnel.entitlements
            echo "Extension entitlements exists: $(test -f ./PacketTunnel/PacketTunnel.entitlements && echo YES || echo NO)"
            cat ./PacketTunnel/PacketTunnel.entitlements
            ldid -S./PacketTunnel/PacketTunnel.entitlements ./build/WarZoneChanger.app/PlugIns/PacketTunnel.appex/PacketTunnel 2>&1 || { echo "Failed to sign extension"; exit 1; }
            echo "Extension signed successfully"
          else
            echo "PacketTunnel.appex not found, checking alternate location..."
            find ./build -name "PacketTunnel" -type f
            exit 1
          fi

      - name: Create IPA
        run: |
          APP_PATH=./build/WarZoneChanger.app
          
          if [ ! -d "$APP_PATH" ]; then
            echo "Could not find app at $APP_PATH"
            ls -la ./build/
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          mkdir -p ./ipa/Payload
          cp -R "$APP_PATH" ./ipa/Payload/
          cd ./ipa
          zip -r WarZoneChanger.ipa Payload
          cd ..
          ls -la ./ipa/WarZoneChanger.ipa

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WarZoneChanger-IPA
          path: ipa/WarZoneChanger.ipa
          retention-days: 90
