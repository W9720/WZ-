name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project WarZoneChanger.xcodeproj \
            -target WarZoneChanger \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Network Extension
        run: |
          xcodebuild build \
            -project WarZoneChanger.xcodeproj \
            -target PacketTunnel \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive Build
        if: success()
        run: |
          xcodebuild archive \
            -project WarZoneChanger.xcodeproj \
            -target WarZoneChanger \
            -configuration Release \
            -sdk iphonesimulator \
            -archivePath build/WarZoneChanger.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WarZoneChanger-Simulator
          path: build/
          retention-days: 30